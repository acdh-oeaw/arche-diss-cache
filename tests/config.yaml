dissCacheService:
  # database holding cache (should be sqlite)
  db: "sqlite::memory:"
  # where and what to log
  log:
    file: /tmp/__log__
    level: debug
  # cache time to leave
  ttl:
    resource: 3600
    response: 31536000
  # list of repository configuration files for direct database connection
  # those config files are created by the https://github.com/acdh-oeaw/arche_cicd_start_action
  repoDb: []
  # allowed resource identifier namespaces
  # request for users outside of allowed namespaces return HTTP 400
  allowedNmsp:
  - https://id.acdh.oeaw.ac.at
  # metadata read mode properies used to fetch RepoResourceInterface rersource
  # metadata before passing it to the callback function
  metadataMode: resource
  parentProperty: ""
  resourceProperties: []
  relativesProperties: []
# authorization settings
auth:
  aclReadProperty: https://vocabs.acdh.oeaw.ac.at/schema#aclRead
  publicRole: public
  academicRole: academic
  roleTrustedHeader: ''
  adminRole: admin
  ttl: 300
  # see https://www.php.net/manual/en/function.password-hash.php
  passwordCost: 10
